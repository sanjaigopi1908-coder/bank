<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Loan Management Portal</title>
    <meta name="description" content="Manage members and their requested loan amounts.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Vault<span class="accent">Bank</span></h1>
            </div>
        </header>

        <main class="main-content">
            <section class="dashboard">
                <div class="card stat-card">
                    <h3>Total Members</h3>
                    <p class="stat-value" id="total-members">0</p>
                </div>
                <div class="card stat-card">
                    <h3>Total Loan Amount</h3>
                    <p class="stat-value" id="total-loans">$0</p>
                </div>
            </section>

            <section class="form-section">
                <div class="card">
                    <h2>Add New Member</h2>
                    <form id="member-form">
                        <div class="input-group">
                            <label for="member-name">Full Name</label>
                            <input type="text" id="member-name" placeholder="e.g. Jane Doe" required>
                        </div>
                        <div class="input-group">
                            <label for="contact-number">Contact Number</label>
                            <input type="tel" id="contact-number" placeholder="e.g. +1 555-0198" required>
                        </div>
                        <div class="input-group">
                            <label for="loan-amount">Requested Loan Amount ($)</label>
                            <input type="number" id="loan-amount" min="1" placeholder="e.g. 50000" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="loan-term">Loan Term (Months)</label>
                                <input type="number" id="loan-term" min="1" placeholder="e.g. 60" required>
                            </div>
                            <div class="input-group">
                                <label for="interest-rate">Interest Rate (%)</label>
                                <input type="number" id="interest-rate" min="0" step="0.1" placeholder="e.g. 5.5" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="loan-purpose">Loan Purpose</label>
                            <select id="loan-purpose" required>
                                <option value="" disabled selected>Select Purpose</option>
                                <option value="Personal">Personal</option>
                                <option value="Auto">Auto</option>
                                <option value="Mortgage">Mortgage</option>
                                <option value="Business">Business</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary">Add Member</button>
                    </form>
                </div>
            </section>

            <section class="list-section">
                <div class="card">
                    <div class="section-header">
                        <h2>Member Directory</h2>
                        <button id="export-btn" class="btn-secondary">Export CSV</button>
                    </div>
                    
                    <div class="controls-row">
                        <div class="input-group search-box">
                            <input type="text" id="search-input" placeholder="Search by name...">
                        </div>
                        <div class="input-group filter-box">
                            <select id="status-filter">
                                <option value="All">All Statuses</option>
                                <option value="Pending">Pending</option>
                                <option value="Approved">Approved</option>
                                <option value="Rejected">Rejected</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="member-table">
                            <thead>
                                <tr>
                                    <th>Name & Contact</th>
                                    <th>Loan Details</th>
                                    <th>Monthly Pmt</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="member-list">
                                <!-- Member rows will be populated here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="empty-state">
                        <p>No members match your criteria.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
