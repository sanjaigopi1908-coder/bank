<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Loan Management Portal</title>
    <meta name="description" content="Manage members and their requested loan amounts.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Vault<span class="accent">Bank</span></h1>
            </div>
        </header>

        <main class="main-content">
            <section class="dashboard">
                <div class="card stat-card">
                    <h3>Total Members</h3>
                    <p class="stat-value" id="total-members">0</p>
                </div>
                <div class="card stat-card">
                    <h3>Total Loan Amount</h3>
                    <p class="stat-value" id="total-loans">$0</p>
                </div>
            </section>

            <section class="form-section">
                <div class="card">
                    <h2>Add New Member</h2>
                    <form id="member-form">
                        <div class="input-group">
                            <label for="member-name">Full Name</label>
                            <input type="text" id="member-name" placeholder="e.g. Jane Doe" required>
                        </div>
                        <div class="input-group">
                            <label for="contact-number">Contact Number</label>
                            <input type="tel" id="contact-number" placeholder="e.g. +1 555-0198" required>
                        </div>
                        <div class="input-group">
                            <label for="loan-amount">Requested Loan Amount ($)</label>
                            <input type="number" id="loan-amount" min="1" placeholder="e.g. 50000" required>
                        </div>
                        <button type="submit" class="btn-primary">Add Member</button>
                    </form>
                </div>
            </section>

            <section class="list-section">
                <div class="card">
                    <h2>Member Directory</h2>
                    <div class="table-container">
                        <table id="member-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Contact Number</th>
                                    <th>Requested Loan</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="member-list">
                                <!-- Member rows will be populated here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="empty-state">
                        <p>No members registered yet. Add a member above to get started.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
